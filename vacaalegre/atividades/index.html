<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaca Alegre - Restaurante Vegano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="nav-logo">
            <img src="imagens/vaca-alegre-marca.svg" alt="">
        </div>
        <ul class="nav-links">
            <li><a href="">Home</a></li>
            <li><a href="">Cardápio</a></li>
            <li><a href="">Sobre nós</a></li>

        <div class="nav-actions">
            <span class="nav-cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
            </span>
            <button class="btn-entrar">

                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-topo">

                <h1 class="hero-title">
                    vaca <br>
                    <span class="alegre">Alegre</span>
                </h1>
            </div>
            <div class="hero-menu">
                <div class="hero-menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </svg>

                </div>
                <div class="hero-menu-item">

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 11l19-9-9 19-2-8-8-2z" /></svg>

                </div>
                <div class="hero-menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>

                </div>
                <div class="hero-menu active">
                    Restaurante Vegano
                </div>
            </div>
    </div>
    <div class="hero-banner">
        <img src="imagens/espaco.png" alt="">
        <div class="hero-banner-cotent">
            <p>
                Ao da refeição, <br>
                <strong>Você não será o único feliz.></strong>
            </p>
            <button class="bt-contato">
                Entar em contato
            </button>
        </div>

    </div>
    </div>
